name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install "cryptography>=42,<45" "cbor2>=5.6,<6" "pytest>=8,<9" "hypothesis>=6.100,<7"
          pip install -e .

      - name: Test suite (attacks + properties + vectors)
        run: python -m pytest tests/ -q

      - name: Vectors are not stale
        run: python tools/gen_vectors.py --check

      - name: CLI demo runs and blocks every attack
        run: python demo.py

      - name: Demo JS is syntactically valid
        # The browser demo is a parallel JS prop (JSON encoding, not the canonical
        # CBOR wire format), so we only syntax-check it here — it is not yet a
        # wire-conformant port (see NEXT_STEPS P2.8).
        run: |
          python - <<'PY'
          import re, pathlib
          html = pathlib.Path("muhuri-demo.html").read_text()
          scripts = re.findall(r"<script[^>]*>(.*?)</script>", html, re.S)
          pathlib.Path("/tmp/demo.js").write_text("\n".join(scripts))
          PY
          node --check /tmp/demo.js
